name: test-and-build

on:
  push: {}

permissions:
  contents: read

jobs:
  test-and-build:
    defaults:
      run:
        shell: bash

    container:
      image: ghcr.io/luzifer-docker/action-env:master@sha256:2539b418c38b69856f9f0a34de0110b6fb23dc425cf1ddcb3f00add2ca5f916c
      env:
        CGO_ENABLED: 1
        GOPATH: /go

    runs-on: forgejo

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Required Packages
        run: |
          apt-get install \
            -y --no-install-recommends \
            libhidapi-dev \
            libudev-dev

      - name: Test and Lint
        run: |
          go test -v ./...
          golangci-lint run ./...

      - name: Build release
        run: go build .
